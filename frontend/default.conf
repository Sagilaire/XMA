# Nginx configuration for the XAPK Multi-Account frontend.
#
# Listens on port 3015 (matches docker-compose mapping 3015:3015).
# Compatible with Nginx Proxy Manager: only uses well-known directives and
# keeps the listening port identical to the upstream port, so a proxy host
# entry's `port` field is just `3015` (standard port).
#
# All static content is served from /usr/share/nginx/html. The SPA is a
# single-page React app, so unknown paths fall back to /index.html.
#
# As a convenience while running everything via docker compose, requests
# starting with /api are reverse-proxied to the backend service. This makes
# the frontend work both via VITE_API_BASE_URL (recommended, with the
# browser talking straight to the backend on its exposed port) AND via
# relative /api paths when placed behind Nginx Proxy Manager that strips
# /api.

server {
    listen 3015 default_server;
    listen [::]:3015 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Large XAPK uploads can be served back through the SPA, so allow a
    # generous body size in case Nginx ever terminates the multipart.
    client_max_body_size 3072m;

    # Gzip text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Default proxy headers when reverse-proxying to upstream services.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Hidden location: when nginx sits behind Nginx Proxy Manager and the
    # upstream is configured to forward /api/* here, transparently relay
    # to the backend container. Disabled by default; comment in if needed.
    # location /api/ {
    #     proxy_pass http://backend:4015/;
    # }

    # Long-cache hashed JS / CSS assets produced by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: serve whatever static asset Vite emitted, otherwise
    # hand back index.html so client-side routes resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Standard health endpoint for Nginx Proxy Manager / docker healthchecks.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
